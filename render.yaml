services:
  # ==========================================
  # Backend API (Node.js + Express)
  # Domain: api.travyytouring.page
  # ==========================================
  - type: web
    name: travyy-be
    env: docker
    plan: free
    rootDir: touring-be
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: CLIENT_URL
        value: https://www.travyytouring.page
      - key: FRONTEND_URL
        value: https://www.travyytouring.page
      - key: SERVER_URL
        value: https://api.travyytouring.page
      - key: CORS_ORIGINS
        value: https://www.travyytouring.page,https://travyytouring.page
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://api.travyytouring.page/api/auth/google/callback
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_CALLBACK_URL
        value: https://api.travyytouring.page/api/auth/facebook/callback
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GOONG_API_KEY
        sync: false
      - key: MAP4D_API_KEY
        sync: false
      - key: AI_SERVICE_URL
        value: https://ai-embed.travyytouring.page
      - key: EMBED_SERVICE_URL
        value: https://ai-embed.travyytouring.page
      - key: DEFAULT_GUIDE_PASSWORD
        sync: false
      - key: VITE_MOCK_ADMIN_PASSWORD
        sync: false

  # ==========================================
  # Frontend Application (React + Vite)
  # Domain: www.travyytouring.page
  # ==========================================
  - type: web
    name: travyy-fe
    env: docker
    plan: free
    rootDir: touring-fe
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        value: https://api.travyytouring.page
      - key: VITE_AI_EMBED_URL
        value: https://ai-embed.travyytouring.page
      - key: VITE_AI_SEARCH_URL
        value: https://travyy-ai-search.onrender.com
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOONG_API_KEY
        sync: false
      - key: VITE_MAP4D_API_KEY
        sync: false

  # ==========================================
  # AI Embed Service (Python FastAPI)
  # Domain: ai-embed.travyytouring.page
  # ==========================================
  - type: web
    name: travyy-ai-embed
    env: docker
    plan: free
    rootDir: ai-embed
    dockerfilePath: ./Dockerfile
    envVars:
      - key: EMBED_PROVIDER
        value: hf_inference
      - key: MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: HF_TOKEN
        sync: false

  # ==========================================
  # AI Search Service (Python FastAPI + FAISS)
  # URL: https://travyy-ai-search.onrender.com
  # ==========================================
  - type: web
    name: travyy-ai-search
    env: docker
    plan: free
    rootDir: ai-search
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AI_EMBED_URL
        value: https://ai-embed.travyytouring.page
      - key: FAISS_INDEX_PATH
        value: ""
      - key: VECTOR_DIM
        value: "384"
